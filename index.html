<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin: 0;
  min-height: 100%;
}

body {
  background: url("light_grey.jpg") repeat; /* tiled background */
}

.svg-embed {
  width: 100%;
  height: auto;
  display: block;
}
</style>
</head>
<body>

<!-- Embed container -->
<embed src="portrait.svg" class="svg-embed" id="svgEmbed">

<script>
// Preload both SVGs for instant swap
const svgFiles = {
  portrait: 'portrait.svg',
  landscape: 'landscape.svg'
};

for (const key in svgFiles) {
  const img = new Image();
  img.src = svgFiles[key];
}

// Track current orientation to avoid unnecessary reloads
let currentOrientation = '';

function swapSVG() {
  const embed = document.getElementById('svgEmbed');
  const orientation = window.innerWidth > window.innerHeight ? 'landscape' : 'portrait';

  if (orientation !== currentOrientation) {
    embed.src = svgFiles[orientation];
    currentOrientation = orientation;
  }
}

// Initial load
swapSVG();

// Listen to orientation and resize events
window.addEventListener('resize', swapSVG);
window.addEventListener('orientationchange', swapSVG);
</script>

</body>
</html>
